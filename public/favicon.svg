<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle with subtle glow -->
  <circle cx="32" cy="32" r="30" fill="url(#grad1)" opacity="0.15"/>

  <!-- Outer ring - representing a game cartridge/coin -->
  <circle cx="32" cy="32" r="26" stroke="url(#grad1)" stroke-width="3" fill="none"/>

  <!-- Stylized "B" / game controller D-pad concept -->
  <!-- Left side of B / D-pad left -->
  <rect x="18" y="18" width="12" height="8" rx="2" fill="url(#grad1)"/>
  <rect x="18" y="26" width="8" height="10" rx="1.5" fill="url(#grad1)"/>
  <rect x="18" y="38" width="12" height="8" rx="2" fill="url(#grad1)"/>

  <!-- Vertical connector / center of D-pad -->
  <rect x="26" y="28" width="8" height="8" rx="1" fill="url(#grad1)"/>

  <!-- Right accent / D-pad right -->
  <rect x="34" y="29" width="8" height="6" rx="1.5" fill="url(#grad1)"/>

  <!-- Small dot at top (power button style) -->
  <circle cx="32" cy="16" r="2.5" fill="url(#grad1)" filter="url(#glow)"/>
</svg>
