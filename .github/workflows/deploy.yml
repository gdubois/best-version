# GitHub Actions workflow for automated deployment
# Story 6.3: Automated Deployment Pipeline

name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================
  # BUILD JOB: Build and test Docker image
  # ============================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      build-id: ${{ steps.build.outputs.build-id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Extract build metadata
        id: build
        run: echo "build-id=${{ github.run_id }}-${{ github.run_attempt }}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.run_id }}

      - name: Test Docker image
        run: |
          docker run --rm ${{ steps.meta.outputs.tags }} node -e "require('./src/index.js')" &
          sleep 3
          curl -f http://localhost:3000/health || exit 1
          killall node || true

  # ============================================================
  # DEPLOY JOB: Deploy to server via SSH
  # ============================================================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Push Docker image to registry
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.run_id }}

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            # Pull latest image
            echo "Pulling latest Docker image..."
            docker login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ghcr.io
            docker pull ghcr.io/${{ github.repository }}:${{ github.sha }}
            docker tag ghcr.io/${{ github.repository }}:${{ github.sha }} ghcr.io/${{ github.repository }}:latest
            docker login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ghcr.io
            docker push ghcr.io/${{ github.repository }}:latest

            # Stop old container gracefully
            echo "Stopping old container..."
            docker stop best-version || true
            docker rm best-version || true

            # Start new container with updated image
            echo "Starting new container..."
            docker run -d \
              --name best-version \
              --restart unless-stopped \
              -p 3000:3000 \
              -v $(pwd)/games:/app/games \
              -v $(pwd)/submissions:/app/submissions \
              -e NODE_ENV=production \
              ghcr.io/${{ github.repository }}:latest

            # Health check with retry
            echo "Running health check..."
            MAX_RETRIES=10
            RETRY_COUNT=0
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -f http://localhost:3000/health 2>/dev/null; then
                echo "Health check passed!"
                break
              fi
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "Health check attempt $RETRY_COUNT failed, retrying..."
              sleep 2
            done

            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              echo "Health check failed after $MAX_RETRIES attempts"
              exit 1
            fi

            # Log deployment
            echo "Deployment completed successfully!"
            docker ps --filter name=best-version
            docker logs --tail 20 best-version

      - name: Send deployment notification
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: |
            Deployment successful!
            Repository: ${{ github.repository }}
            Commit: ${{ github.sha }}
            Version: ${{ github.sha }}
          author_name: GitHub Actions
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        failure: false
        success: false

  # ============================================================
  # ROLLBACK JOB: Rollback to previous deployment
  # ============================================================
  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Rollback on server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            # Stop current container
            echo "Stopping current container..."
            docker stop best-version || true
            docker rm best-version || true

            # Get previous image tag (before latest)
            echo "Rolling back to previous image..."
            docker pull ghcr.io/${{ github.repository }}:previous || docker pull ghcr.io/${{ github.repository }}:latest~1

            # Start with previous image
            echo "Starting previous container..."
            docker run -d \
              --name best-version \
              --restart unless-stopped \
              -p 3000:3000 \
              -v $(pwd)/games:/app/games \
              -v $(pwd)/submissions:/app/submissions \
              -e NODE_ENV=production \
              ghcr.io/${{ github.repository }}:latest~1

            # Health check
            echo "Running health check..."
            MAX_RETRIES=10
            RETRY_COUNT=0
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -f http://localhost:3000/health 2>/dev/null; then
                echo "Health check passed!"
                break
              fi
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "Health check attempt $RETRY_COUNT failed, retrying..."
              sleep 2
            done

            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              echo "Health check failed after $MAX_RETRIES attempts"
              exit 1
            fi

            # Log rollback
            echo "Rollback completed successfully!"
            docker ps --filter name=best-version

  # ============================================================
  # MANUAL ROLLBACK TRIGGER (via workflow_dispatch)
  # ============================================================
  manual-rollback:
    name: Manual Rollback
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    triggers:
      workflow_dispatch:
        inputs:
          target_version:
            description: 'Version tag to rollback to (e.g., abc1234)'
            required: true
            default: 'latest~1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Execute rollback to specific version
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            TARGET_VERSION="${{ github.event.inputs.target_version }}"
            echo "Rolling back to version: $TARGET_VERSION"

            # Stop current container
            docker stop best-version || true
            docker rm best-version || true

            # Pull target version
            docker pull ghcr.io/${{ github.repository }}:$TARGET_VERSION
            docker tag ghcr.io/${{ github.repository }}:$TARGET_VERSION ghcr.io/${{ github.repository }}:rollback

            # Start rolled-back container
            docker run -d \
              --name best-version \
              --restart unless-stopped \
              -p 3000:3000 \
              -v $(pwd)/games:/app/games \
              -v $(pwd)/submissions:/app/submissions \
              -e NODE_ENV=production \
              ghcr.io/${{ github.repository }}:rollback

            # Health check
            MAX_RETRIES=10
            RETRY_COUNT=0
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -f http://localhost:3000/health 2>/dev/null; then
                echo "Rollback health check passed!"
                break
              fi
              RETRY_COUNT=$((RETRY_COUNT + 1))
              sleep 2
            done

            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              echo "Rollback health check failed"
              exit 1
            fi

            echo "Manual rollback to $TARGET_VERSION completed!"
