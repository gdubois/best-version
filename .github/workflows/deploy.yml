# GitHub Actions workflow for automated deployment
# Story 6.3: Automated Deployment Pipeline

name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================
  # BUILD JOB: Build and test Docker image
  # ============================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      build-id: ${{ steps.build.outputs.build-id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Extract build metadata
        id: build
        run: echo "build-id=${{ github.run_id }}-${{ github.run_attempt }}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.run_id }}

      - name: Test Docker image
        run: |
          docker run --rm ${{ steps.meta.outputs.tags }} node -e "require('./src/index.js')" &
          sleep 3
          curl -f http://localhost:3000/health || exit 1
          killall node || true

  # ============================================================
  # DEPLOY JOB: Deploy to server via SSH
  # ============================================================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Push Docker image to registry
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.run_id }}

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            # Pull latest image
            echo "Pulling latest Docker image..."
            docker login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ghcr.io
            docker pull ghcr.io/${{ github.repository }}:${{ github.sha }}
            docker tag ghcr.io/${{ github.repository }}:${{ github.sha }} ghcr.io/${{ github.repository }}:latest

            # Pull open-websearch MCP service
            echo "Pulling open-websearch MCP service..."
            docker pull ghcr.io/aas-ee/open-web-search:latest

            # Create .env file with production values (using GitHub secrets)
            echo "Creating .env configuration..."
            cat > .env << EOF
            NODE_ENV=production
            PORT=3000
            OPEN_WEBSEARCH_MCP_ENABLED=true
            OPEN_WEBSEARCH_MCP_ENGINE=${{ secrets.OPEN_WEBSEARCH_MCP_ENGINE || 'duckduckgo' }}
            OPEN_WEBSEARCH_MCP_HOST=http://open-websearch:3000
            OPEN_WEBSEARCH_MCP_ENDPOINT=/search
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY || '' }}
            COOKIE_SECRET=${{ secrets.COOKIE_SECRET || 'change-this-to-a-random-secure-string' }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD || '' }}
            LLM_ENDPOINT=${{ secrets.LLM_ENDPOINT || 'http://10.0.0.15:1234/v1/chat/completions' }}
            LLM_MODEL=${{ secrets.LLM_MODEL || 'llama3.2' }}
            GAME_CREATOR_ENABLED=${{ secrets.GAME_CREATOR_ENABLED || 'true' }}
            MCP_SERVER_ENABLED=${{ secrets.MCP_SERVER_ENABLED || 'true' }}
            DUCKDUCKGO_ENABLED=${{ secrets.DUCKDUCKGO_ENABLED || 'true' }}
            BRAVE_SEARCH_ENABLED=${{ secrets.BRAVE_SEARCH_ENABLED || 'true' }}
            USE_PROXY=${{ secrets.USE_PROXY || 'false' }}
            PROXY_URL=${{ secrets.PROXY_URL || 'http://127.0.0.1:7890' }}
            ALLOWED_SEARCH_ENGINES=${{ secrets.ALLOWED_SEARCH_ENGINES || 'duckduckgo,bing,exa,brave' }}
            EOF

            # Create docker-compose file with both services
            echo "Creating docker-compose configuration..."
            cat > docker-compose.yml << 'COMPOSE_EOF'
            version: '3.8'
            services:
              open-websearch:
                image: ghcr.io/aas-ee/open-web-search:latest
                container_name: open-websearch-mcp
                restart: unless-stopped
                ports:
                  - "3001:3000"
                environment:
                  - MODE=http
                  - PORT=3000
                  - DEFAULT_SEARCH_ENGINE=${OPEN_WEBSEARCH_MCP_ENGINE:-duckduckgo}
                  - ENABLE_CORS=true
                  - CORS_ORIGIN=*
                  - USE_PROXY=${USE_PROXY:-false}
                  - PROXY_URL=${PROXY_URL:-http://127.0.0.1:7890}
                  - ALLOWED_SEARCH_ENGINES=${ALLOWED_SEARCH_ENGINES:-duckduckgo,bing,exa,brave}
                networks:
                  - best-version-network
                healthcheck:
                  test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:3000/health"]
                  interval: 30s
                  timeout: 10s
                  retries: 5
                  start_period: 30s

              app:
                image: ghcr.io/${{ github.repository }}:latest
                container_name: best-version
                restart: unless-stopped
                ports:
                  - "80:80"
                  - "443:443"
                  - "3000:3000"
                depends_on:
                  open-websearch:
                    condition: service_healthy
                env_file:
                  - .env
                environment:
                  - OPEN_WEBSEARCH_MCP_HOST=http://open-websearch:3000
                  - OPEN_WEBSEARCH_MCP_ENDPOINT=/search
                volumes:
                  - games_data:/app/games
                  - submissions_data:/app/submissions
                  - newsletters_data:/app/newsletters
                  - images_data:/app/images
                  - ssl_certs:/etc/nginx/ssl:ro
                networks:
                  - best-version-network
                healthcheck:
                  test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:3000/health"]
                  interval: 30s
                  timeout: 10s
                  retries: 5
                  start_period: 60s

            volumes:
              games_data:
                name: best-version_games
              submissions_data:
                name: best-version_submissions
              newsletters_data:
                name: best-version_newsletters
              images_data:
                name: best-version_images
              ssl_certs:
                name: best-version_ssl

            networks:
              best-version-network:
                driver: bridge
            COMPOSE_EOF

            # Stop old containers
            echo "Stopping old containers..."
            docker-compose down || true

            # Start new containers with docker-compose
            echo "Starting new containers..."
            docker-compose up -d

            # Wait for services to start
            echo "Waiting for services to initialize..."
            sleep 15

            # Health check for app
            echo "Running health check..."
            MAX_RETRIES=10
            RETRY_COUNT=0
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -f http://localhost:3000/health 2>/dev/null; then
                echo "App health check passed!"
                break
              fi
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "Health check attempt $RETRY_COUNT failed, retrying..."
              sleep 3
            done

            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              echo "Health check failed after $MAX_RETRIES attempts"
              docker-compose logs app
              exit 1
            fi

            # Health check for open-websearch
            echo "Checking open-websearch MCP service..."
            if curl -sf http://localhost:3001/health 2>/dev/null; then
              echo "Open WebSearch MCP service is healthy!"
            else
              echo "WARNING: Open WebSearch MCP service may not be healthy"
              docker-compose logs open-websearch
            fi

            # Log deployment
            echo "Deployment completed successfully!"
            docker-compose ps
            echo "=== App logs ==="
            docker-compose logs --tail 20 app
            echo "=== Open WebSearch logs ==="
            docker-compose logs --tail 10 open-websearch

      - name: Send deployment notification
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: |
            Deployment successful!
            Repository: ${{ github.repository }}
            Commit: ${{ github.sha }}
            Version: ${{ github.sha }}
          author_name: GitHub Actions
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        failure: false
        success: false

  # ============================================================
  # ROLLBACK JOB: Rollback to previous deployment
  # ============================================================
  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Rollback on server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            # Stop current containers
            echo "Stopping current containers..."
            docker-compose down || true
            docker stop best-version || true
            docker rm best-version || true
            docker stop open-websearch-mcp || true
            docker rm open-websearch-mcp || true

            # Pull previous images
            echo "Pulling previous images..."
            docker pull ghcr.io/${{ github.repository }}:latest~1 || docker pull ghcr.io/${{ github.repository }}:previous
            docker pull ghcr.io/aas-ee/open-web-search:latest

            # Start with previous image
            echo "Starting previous container..."

            # Create docker-compose for rollback
            cat > docker-compose.yml << COMPOSE_EOF
            version: '3.8'
            services:
              open-websearch:
                image: ghcr.io/aas-ee/open-web-search:latest
                container_name: open-websearch-mcp
                restart: unless-stopped
                environment:
                  - MODE=http
                  - PORT=3000
                networks:
                  - best-version-network

              app:
                image: ghcr.io/${{ github.repository }}:latest~1
                container_name: best-version
                restart: unless-stopped
                ports:
                  - "3000:3000"
                depends_on:
                  - open-websearch
                volumes:
                  - games_data:/app/games
                  - submissions_data:/app/submissions
                networks:
                  - best-version-network

            volumes:
              games_data:
              submissions_data:

            networks:
              best-version-network:
            COMPOSE_EOF

            docker-compose up -d

            # Health check
            echo "Running health check..."
            MAX_RETRIES=10
            RETRY_COUNT=0
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -f http://localhost:3000/health 2>/dev/null; then
                echo "Health check passed!"
                break
              fi
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "Health check attempt $RETRY_COUNT failed, retrying..."
              sleep 2
            done

            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              echo "Health check failed after $MAX_RETRIES attempts"
              exit 1
            fi

            # Log rollback
            echo "Rollback completed successfully!"
            docker-compose ps

  # ============================================================
  # MANUAL ROLLBACK TRIGGER (via workflow_dispatch)
  # ============================================================
  manual-rollback:
    name: Manual Rollback
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    triggers:
      workflow_dispatch:
        inputs:
          target_version:
            description: 'Version tag to rollback to (e.g., abc1234)'
            required: true
            default: 'latest~1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Execute rollback to specific version
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            TARGET_VERSION="${{ github.event.inputs.target_version }}"
            echo "Rolling back to version: $TARGET_VERSION"

            # Stop current containers
            docker-compose down || true
            docker stop best-version || true
            docker rm best-version || true

            # Pull target version
            docker pull ghcr.io/${{ github.repository }}:$TARGET_VERSION
            docker tag ghcr.io/${{ github.repository }}:$TARGET_VERSION ghcr.io/${{ github.repository }}:rollback

            # Create docker-compose for rollback
            cat > docker-compose.yml << COMPOSE_EOF
            version: '3.8'
            services:
              open-websearch:
                image: ghcr.io/aas-ee/open-web-search:latest
                container_name: open-websearch-mcp
                restart: unless-stopped
                environment:
                  - MODE=http
                  - PORT=3000
                networks:
                  - best-version-network

              app:
                image: ghcr.io/${{ github.repository }}:rollback
                container_name: best-version
                restart: unless-stopped
                ports:
                  - "3000:3000"
                depends_on:
                  - open-websearch
                volumes:
                  - games_data:/app/games
                  - submissions_data:/app/submissions
                networks:
                  - best-version-network

            volumes:
              games_data:
              submissions_data:

            networks:
              best-version-network:
            COMPOSE_EOF

            docker-compose up -d

            # Health check
            MAX_RETRIES=10
            RETRY_COUNT=0
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -f http://localhost:3000/health 2>/dev/null; then
                echo "Rollback health check passed!"
                break
              fi
              RETRY_COUNT=$((RETRY_COUNT + 1))
              sleep 2
            done

            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              echo "Rollback health check failed"
              exit 1
            fi

            echo "Manual rollback to $TARGET_VERSION completed!"
