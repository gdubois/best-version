# =============================================================================
# Best Version Application Container
# =============================================================================
# Single container running both nginx (frontend) and Node.js (backend)
# =============================================================================
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: best-version
    restart: unless-stopped
    ports:
      - "80:80"      # HTTP
      - "443:443"   # HTTPS
      - "3000:3000" # Backend API (internal access)
    environment:
      - NODE_ENV=production
      - PORT=3000
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - SITE_URL=${SITE_URL:-http://localhost}
      - COOKIE_SECRET=${COOKIE_SECRET:-change-this-to-a-random-secure-string}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
    volumes:
      # Data directories - persisted in named volumes
      - games_data:/app/games
      - submissions_data:/app/submissions
      - newsletters_data:/app/newsletters
      # SSL certificates for HTTPS
      - ssl_certs:/etc/nginx/ssl:ro
    networks:
      - best-version-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  # Named volumes for persistent data storage
  games_data:
    name: best-version_games
    external: true
  submissions_data:
    name: best-version_submissions
    external: true
  newsletters_data:
    name: best-version_newsletters
    external: true
  ssl_certs:
    name: best-version_ssl
    external: true

networks:
  best-version-network:
    driver: bridge
    name: best-version-network
